<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度決策時鐘</title>
    <style>
        :root { --bg: #121212; --text: #e0e0e0; --accent: #00e676; --alert: #ff1744; --local: #03a9f4; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; transition: background-color 0.2s; }
        .clock-container { text-align: center; margin-bottom: 20px; transition: transform 0.2s; width: 100%; }
        #clock { font-family: 'Courier New', Courier, monospace; font-size: 12vw; font-weight: bold; line-height: 1; margin: 0; letter-spacing: -2px; }
        #ms { font-size: 5vw; color: #888; }
        .info-panel { background: #1e1e1e; padding: 15px 25px; border-radius: 12px; font-size: 14px; color: #aaa; margin-bottom: 20px; text-align: left; max-width: 400px; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .info-panel p { margin: 5px 0; display: flex; justify-content: space-between; }
        .info-panel strong { color: #fff; }
        .controls { display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; }
        .tabs { display: flex; background: #333; border-radius: 8px; overflow: hidden; margin-bottom: 5px;}
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .tab.active { background: var(--local); color: #000; }
        .tab[data-mode="standard"].active { background: var(--accent); }
        .tab[data-mode="ticket"].active { background: var(--alert); }
        .settings-panel { background: #1e1e1e; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; }
        input[type="url"], input[type="time"], button { padding: 10px; border-radius: 6px; border: none; font-size: 14px; width: 100%; box-sizing: border-box; }
        input[type="url"], input[type="time"] { background: #333; color: #fff; }
        button { background: #333; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: #444; }
        .btn-sync { background: #555; color: #fff;}
        .btn-sync:hover { background: #666; }
        .checkbox-label { font-size: 13px; display: flex; align-items: center; gap: 6px; color: #ccc; cursor: pointer;}
        .status-dot { display: inline-block; width: 10px; height: 10px; background: #555; border-radius: 50%; margin-right: 8px; }
        .sync-active { background: var(--local); box-shadow: 0 0 8px var(--local); }
    </style>
</head>
<body>

    <div class="clock-container" id="clock-container">
        <div id="clock">00:00:00<span id="ms">.000</span></div>
    </div>

    <div class="info-panel">
        <p><span id="mode-status"><span class="status-dot sync-active"></span>本機時間模式 (不消耗要求數)</span></p>
        <p>最後對時: <strong id="val-last-sync">-</strong></p>
        <p>網路補償 (RTT): <strong id="val-rtt">0 ms</strong></p>
        <p>時間誤差: <strong id="val-offset">0 ms</strong></p>
        <p>畫面渲染延遲: <strong id="val-render">0 ms</strong></p>
    </div>

    <div class="controls">
        <div class="tabs">
            <div class="tab active" data-mode="local" onclick="switchMode('local')">💻 本機時間</div>
            <div class="tab" data-mode="standard" onclick="switchMode('standard')">🕒 標準時間</div>
            <div class="tab" data-mode="ticket" onclick="switchMode('ticket')">🎟️ 搶票模式</div>
        </div>

        <div class="settings-panel" id="settings-panel">
            <div id="url-group">
                <input type="url" id="target-url" placeholder="輸入目標/跳轉網址 (例如: https://tixcraft.com)" value="https://tixcraft.com">
            </div>

            <input type="time" id="target-time" step="1" title="目標/開賣時間">
            
            <label class="checkbox-label" title="會使用 DNS 預先解析與 TCP 預先連線，保證不觸發錯誤快取">
                <input type="checkbox" id="auto-redirect"> 倒數歸零自動跳轉 (開啟底層通道 Preload)
            </label>
            
            <div id="sync-group" style="display: none; flex-direction: column; gap: 12px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="auto-sync-10s"> 最後 10 秒自動觸發一次精準對時
                </label>
                <button class="btn-sync" onclick="syncTime()">🔄 手動同步時間</button>
            </div>

            <button onclick="togglePiP()">📺 開啟畫中畫 (懸浮時鐘)</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.time.candy.moe';

        // 系統變數
        let mode = 'local';
        let timeOffset = 0;
        let rtt = 0; 
        let renderDelay = 0;
        let last10sSynced = false;
        let hasPreconnected = false;

        // 【新增】狀態快取區：避免切換分頁重複發送 API 浪費額度
        const syncCache = {
            standard: { offset: 0, rtt: 0, lastSync: '-' },
            ticket: { offset: 0, rtt: 0, lastSync: '-' }
        };

        const clockEl = document.getElementById('clock');
        const rttEl = document.getElementById('val-rtt');
        const offsetEl = document.getElementById('val-offset');
        const renderEl = document.getElementById('val-render');
        const lastSyncEl = document.getElementById('val-last-sync');
        const modeStatus = document.getElementById('mode-status');
        const syncGroup = document.getElementById('sync-group');
        const targetUrlInput = document.getElementById('target-url');
        const targetTimeInput = document.getElementById('target-time');
        const autoRedirect = document.getElementById('auto-redirect');
        const autoSync10s = document.getElementById('auto-sync-10s');

        // 【新增】安全預先連線機制 (DNS Prefetch & Preconnect)
        function setupPreconnect() {
            const url = targetUrlInput.value;
            if (!url) return;
            try {
                const origin = new URL(url).origin;
                // 檢查是否已經插入過
                if (!document.querySelector(`link[href="${origin}"]`)) {
                    // DNS 預先解析
                    const dns = document.createElement('link');
                    dns.rel = 'dns-prefetch';
                    dns.href = origin;
                    // TCP 與 TLS 預先握手 (不發出 HTTP Get)
                    const pre = document.createElement('link');
                    pre.rel = 'preconnect';
                    pre.href = origin;
                    
                    document.head.appendChild(dns);
                    document.head.appendChild(pre);
                    console.log('⚡ 提早建立底層連線通道至:', origin);
                }
            } catch (e) { console.error('Preconnect Error:', e); }
        }

        async function syncTime() {
            if (mode === 'local') return; 

            const t0 = performance.now();
            let serverTime = 0;
            
            try {
                if (mode === 'standard') {
                    modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:var(--accent);"></span>向標準伺服器同步中...`;
                    const res = await fetch(`${API_BASE}/api/time`);
                    if(!res.ok) throw new Error('API Error');
                    const data = await res.json();
                    serverTime = data.serverTime;
                } else if (mode === 'ticket') {
                    const url = targetUrlInput.value;
                    if(!url) {
                        alert("請先輸入售票網址！");
                        modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:var(--alert);"></span>搶票模式 (請輸入網址)`;
                        return;
                    }
                    modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:#ff9800;"></span>探測目標伺服器中...`;
                    const res = await fetch(`${API_BASE}/api/proxy-time?url=${encodeURIComponent(url)}`);
                    if(!res.ok) throw new Error('API Error');
                    const data = await res.json();
                    if(data.targetTime) {
                        serverTime = data.targetTime;
                    } else {
                        throw new Error('無 Date 標頭');
                    }
                }

                const t3 = performance.now();
                const totalRTT = t3 - t0;
                const currentLocalTime = Date.now();
                
                rtt = parseFloat(totalRTT.toFixed(1));
                timeOffset = (serverTime + (rtt / 2)) - currentLocalTime;
                
                const now = new Date();
                const syncTimeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                
                // 更新畫面
                lastSyncEl.innerText = syncTimeStr;
                rttEl.innerText = rtt + ' ms';
                offsetEl.innerText = timeOffset.toFixed(1) + ' ms';
                
                // 【新增】寫入快取
                syncCache[mode] = { offset: timeOffset, rtt: rtt, lastSync: syncTimeStr };

                if (mode === 'standard') {
                    modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:var(--accent);"></span>標準對時模式 (已校正)`;
                } else if(mode === 'ticket') {
                    modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:var(--alert);"></span>搶票模式 (鎖定售票站時間)`;
                }

            } catch (err) {
                console.error('同步失敗:', err);
                modeStatus.innerHTML = `<span class="status-dot" style="background:red;"></span>同步失敗 (請重試)`;
            }
        }

        function updateClock() {
            const tStart = performance.now();
            const preciseTime = new Date(Date.now() + timeOffset);
            
            const h = preciseTime.getHours().toString().padStart(2, '0');
            const m = preciseTime.getMinutes().toString().padStart(2, '0');
            const s = preciseTime.getSeconds().toString().padStart(2, '0');
            const ms = preciseTime.getMilliseconds().toString().padStart(3, '0');

            clockEl.innerHTML = `${h}:${m}:${s}<span id="ms">.${ms}</span>`;

            if (targetTimeInput.value) {
                const targetMatch = targetTimeInput.value.split(':');
                if(targetMatch.length >= 2) {
                    const th = parseInt(targetMatch[0]);
                    const tm = parseInt(targetMatch[1]);
                    const ts = targetMatch[2] ? parseInt(targetMatch[2]) : 0;
                    
                    const tDate = new Date(preciseTime);
                    tDate.setHours(th, tm, ts, 0);
                    
                    const timeDiff = tDate.getTime() - preciseTime.getTime();

                    // 進入最後 10 秒區間
                    if (timeDiff > 0 && timeDiff <= 10000) {
                        document.body.style.backgroundColor = '#2a0a0a';
                        
                        // 1. 最後 10 秒自動對時 (僅觸發一次)
                        if (mode !== 'local' && autoSync10s.checked && !last10sSynced) {
                            last10sSynced = true;
                            syncTime(); 
                        }

                        // 2. 建立底層通道 Preconnect (僅觸發一次)
                        if (autoRedirect.checked && !hasPreconnected) {
                            hasPreconnected = true;
                            setupPreconnect();
                        }
                    } else {
                        document.body.style.backgroundColor = 'var(--bg)';
                        // 重置狀態
                        if (timeDiff > 10000 || timeDiff < 0) {
                            last10sSynced = false; 
                            hasPreconnected = false;
                        }
                    }

                    // 歸零自動跳轉 (直接替換頁面，100% 繞過阻擋)
                    const jumpOffset = (mode === 'local') ? 0 : (rtt / 2);
                    if (autoRedirect.checked && timeDiff > -1000 && timeDiff <= jumpOffset) {
                        autoRedirect.checked = false; 
                        const redirectUrl = targetUrlInput.value || window.location.href;
                        window.location.href = redirectUrl; 
                    }
                }
            } else {
                document.body.style.backgroundColor = 'var(--bg)';
            }

            requestAnimationFrame((tNext) => {
                renderDelay = (tNext - tStart).toFixed(2);
                renderEl.innerText = renderDelay + ' ms';
                updateClock(); 
            });
        }

        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab[data-mode="${mode}"]`).classList.add('active');
            
            last10sSynced = false;
            document.body.style.backgroundColor = 'var(--bg)';

            if (mode === 'local') {
                // 回到本機模式，重置畫面參數
                timeOffset = 0; rtt = 0;
                rttEl.innerText = '0 ms'; offsetEl.innerText = '0 ms';
                syncGroup.style.display = 'none';
                lastSyncEl.innerText = '-';
                modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:var(--local);"></span>本機時間模式 (不消耗要求數)`;
            } else {
                // 進入連網模式
                syncGroup.style.display = 'flex';
                const state = syncCache[mode];
                
                if (state.lastSync !== '-') {
                    // 【重點】如果之前同步過，直接載入快取，不發送 API！
                    timeOffset = state.offset;
                    rtt = state.rtt;
                    rttEl.innerText = rtt + ' ms';
                    offsetEl.innerText = timeOffset.toFixed(1) + ' ms';
                    lastSyncEl.innerText = state.lastSync;
                    
                    const color = mode === 'standard' ? 'var(--accent)' : 'var(--alert)';
                    const txt = mode === 'standard' ? '標準對時模式' : '搶票模式';
                    modeStatus.innerHTML = `<span class="status-dot sync-active" style="background:${color};"></span>${txt} (使用暫存，節省額度)`;
                } else {
                    // 第一次進入該模式，發起同步
                    timeOffset = 0; rtt = 0;
                    rttEl.innerText = '0 ms'; offsetEl.innerText = '0 ms';
                    lastSyncEl.innerText = '同步中...';
                    syncTime(); 
                }
            }
        }

        // 防呆機制：當網址改變時，清空搶票模式的快取
        targetUrlInput.addEventListener('input', () => {
            syncCache.ticket = { offset: 0, rtt: 0, lastSync: '-' };
            if (mode === 'ticket') {
                modeStatus.innerHTML = `<span class="status-dot" style="background:#888;"></span>網址已變更，請手動重新同步`;
                lastSyncEl.innerText = '待同步';
            }
        });

        async function togglePiP() {
            if (!('documentPictureInPicture' in window)) {
                alert('您的瀏覽器不支援畫中畫功能 (請使用最新版 Chrome/Edge)');
                return;
            }
            try {
                const pipWindow = await documentPictureInPicture.requestWindow({ width: 360, height: 120 });
                
                // 【修改】動態 CSS：加入 vh 高度限制 (min 函式)，解決畫面太寬導致字體溢出上下邊界的問題
                const pipStyle = pipWindow.document.createElement('style');
                pipStyle.textContent = `
                    body { margin: 0; background: #121212; color: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
                    #clock-container { width: 100%; text-align: center; }
                    /* 使用 min(15vw, 60vh) 確保不管怎麼拉扯，字體都在安全範圍 */
                    #clock { font-size: min(15vw, 60vh); font-weight: bold; white-space: nowrap; letter-spacing: -2px; margin: 0; line-height: 1; }
                    #ms { font-size: min(8vw, 30vh); color: #888; }
                `;
                pipWindow.document.head.appendChild(pipStyle);

                pipWindow.document.body.innerHTML = '<div id="clock-container"><div id="clock"></div></div>';
                
                setInterval(() => {
                    if(pipWindow.document.getElementById('clock')) {
                        pipWindow.document.getElementById('clock').innerHTML = clockEl.innerHTML;
                    }
                }, 16);
            } catch (err) {
                console.error(err);
            }
        }

        requestAnimationFrame(updateClock);
    </script>
</body>
</html>
